develop:build:
  stage: build
  image:
    name: node:20
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master"
    - when: never
  script:
    - npm ci --omit=peer
    - npm test
    - npx playwright install --with-deps chromium
    - npm run test:e2e -- --project=chromium
    - npm run build
  artifacts:
    paths:
      - ./dist
    expire_in: 1 hour

develop:deploy:
  stage: deploy
  image:
    name: andreysenov/firebase-tools
  dependencies:
    - develop:build
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - when: never
  before_script:
    - echo $FIARD_PRIVATE_KEY > "$HOME/private-key.json"
    - export GOOGLE_APPLICATION_CREDENTIALS="$HOME/private-key.json"
  script:
    - firebase use "lucacesarano-com"
    - firebase deploy -m "Pipe $CI_PIPELINE_ID Build $CI_BUILD_ID" --only hosting:beta-lucacesarano-com --non-interactive
