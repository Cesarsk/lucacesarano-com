develop:unit:
  stage: build
  image:
    name: node:20
  interruptible: true
  variables:
    NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - package-lock.json
    policy: pull-push
    paths:
      - .npm/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master"
    - when: never
  script:
    - npm ci --omit=peer
    - npm test

develop:e2e:
  stage: build
  image:
    name: mcr.microsoft.com/playwright:v1.58.2-jammy
  interruptible: true
  variables:
    NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
    PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
  cache:
    key:
      files:
        - package-lock.json
    policy: pull-push
    paths:
      - .npm/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master"
    - when: never
  script:
    - npm ci --omit=peer
    - npm run test:e2e -- --project=chromium
  artifacts:
    when: always
    paths:
      - ./playwright-report
      - ./test-results
    expire_in: 1 hour

develop:build:
  stage: build
  image:
    name: node:20
  interruptible: true
  variables:
    NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - package-lock.json
    policy: pull-push
    paths:
      - .npm/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master"
    - when: never
  needs:
    - develop:unit
    - develop:e2e
  script:
    - npm ci --omit=peer
    - npm run build
  artifacts:
    paths:
      - ./dist
    expire_in: 1 hour

develop:deploy:
  stage: deploy
  image:
    name: andreysenov/firebase-tools
  needs:
    - develop:build
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - when: never
  before_script:
    - |
      if [ -z "$FIARD_PRIVATE_KEY" ]; then
        echo "Missing FIARD_PRIVATE_KEY CI variable" >&2
        exit 1
      fi
    - |
      if [ -f "$FIARD_PRIVATE_KEY" ]; then
        cp "$FIARD_PRIVATE_KEY" "$HOME/private-key.json"
      else
        printf '%s' "$FIARD_PRIVATE_KEY" > "$HOME/private-key.json"
      fi
    - export GOOGLE_APPLICATION_CREDENTIALS="$HOME/private-key.json"
  script:
    - firebase deploy --project "lucacesarano-com" -m "Pipe $CI_PIPELINE_ID Build $CI_BUILD_ID" --only hosting:beta-lucacesarano-com --non-interactive

develop:deploy:alpha:
  stage: deploy
  image:
    name: andreysenov/firebase-tools
  needs:
    - develop:build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^feature\//
    - when: never
  before_script:
    - |
      if [ -z "$FIARD_PRIVATE_KEY" ]; then
        echo "Missing FIARD_PRIVATE_KEY CI variable. For MR deploys, set it as non-protected or expose it to MR pipelines." >&2
        exit 1
      fi
    - |
      if [ -f "$FIARD_PRIVATE_KEY" ]; then
        cp "$FIARD_PRIVATE_KEY" "$HOME/private-key.json"
      else
        printf '%s' "$FIARD_PRIVATE_KEY" > "$HOME/private-key.json"
      fi
    - export GOOGLE_APPLICATION_CREDENTIALS="$HOME/private-key.json"
  script:
    - firebase deploy --project "lucacesarano-com" -m "MR $CI_MERGE_REQUEST_IID Pipe $CI_PIPELINE_ID Build $CI_BUILD_ID" --only hosting:alpha-lucacesarano-com --non-interactive
