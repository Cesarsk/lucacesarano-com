name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '20'
  FIREBASE_PROJECT_ID: 'lucacesarano-com'
  FIREBASE_ALPHA_SITE: 'alpha-lucacesarano-com'
  FIREBASE_BETA_SITE: 'beta-lucacesarano-com'
  FIREBASE_PROD_SITE: 'lucacesarano-com'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=peer

      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=peer

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - unit
      - e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=peer

      - name: Build app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  check-open-pr:
    name: Check Open PR For Feature Branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')
    outputs:
      has_open_pr: ${{ steps.check.outputs.has_open_pr }}
    steps:
      - name: Detect open pull request
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 100,
            });
            core.setOutput('has_open_pr', prs.length > 0 ? 'true' : 'false');

  deploy-alpha:
    name: Deploy Alpha (feature branches with open PR)
    runs-on: ubuntu-latest
    needs:
      - build
      - check-open-pr
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/') && needs.check-open-pr.outputs.has_open_pr == 'true' && (secrets.FIREBASE_SERVICE_ACCOUNT != '' || secrets.FIARD_PRIVATE_KEY != '')
    concurrency:
      group: alpha-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIARD_PRIVATE_KEY: ${{ secrets.FIARD_PRIVATE_KEY }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/private-key.json"
          elif [ -n "$FIARD_PRIVATE_KEY" ]; then
            printf '%s' "$FIARD_PRIVATE_KEY" > "$HOME/private-key.json"
          else
            echo "Missing FIREBASE_SERVICE_ACCOUNT (or legacy FIARD_PRIVATE_KEY) secret" >&2
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/private-key.json" >> "$GITHUB_ENV"

      - name: Deploy to alpha
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only "hosting:$FIREBASE_ALPHA_SITE" --non-interactive

  deploy-beta:
    name: Deploy Beta (develop)
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && github.ref_name == 'develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIARD_PRIVATE_KEY: ${{ secrets.FIARD_PRIVATE_KEY }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/private-key.json"
          elif [ -n "$FIARD_PRIVATE_KEY" ]; then
            printf '%s' "$FIARD_PRIVATE_KEY" > "$HOME/private-key.json"
          else
            echo "Missing FIREBASE_SERVICE_ACCOUNT (or legacy FIARD_PRIVATE_KEY) secret" >&2
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/private-key.json" >> "$GITHUB_ENV"

      - name: Deploy to beta
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only "hosting:$FIREBASE_BETA_SITE" --non-interactive

  deploy-prod:
    name: Deploy Production (master)
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && github.ref_name == 'master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIARD_PRIVATE_KEY: ${{ secrets.FIARD_PRIVATE_KEY }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/private-key.json"
          elif [ -n "$FIARD_PRIVATE_KEY" ]; then
            printf '%s' "$FIARD_PRIVATE_KEY" > "$HOME/private-key.json"
          else
            echo "Missing FIREBASE_SERVICE_ACCOUNT (or legacy FIARD_PRIVATE_KEY) secret" >&2
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/private-key.json" >> "$GITHUB_ENV"

      - name: Deploy to production
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only "hosting:$FIREBASE_PROD_SITE" --non-interactive
