name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '20'
  FIREBASE_PROJECT_ID: 'lucacesarano-com'
  FIREBASE_ALPHA_SITE: 'alpha-lucacesarano-com'
  FIREBASE_BETA_SITE: 'beta-lucacesarano-com'
  FIREBASE_PROD_SITE: 'lucacesarano-com'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=peer

      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=peer

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - unit
      - e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=peer

      - name: Build app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  check-open-pr:
    name: Check Open PR For Feature Branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      has_open_pr: ${{ steps.check.outputs.has_open_pr }}
    steps:
      - name: Detect open pull request
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            if (!branch.startsWith('feature/')) {
              core.setOutput('has_open_pr', 'false');
              return;
            }

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 100,
            });
            core.setOutput('has_open_pr', prs.length > 0 ? 'true' : 'false');

  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    needs:
      - build
      - check-open-pr
    if: github.event_name == 'push'
    concurrency:
      group: hosting-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Resolve deploy target
        id: target
        run: |
          TARGET_SITE=""

          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            TARGET_SITE="${FIREBASE_BETA_SITE}"
          elif [ "${GITHUB_REF_NAME}" = "master" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            TARGET_SITE="${FIREBASE_PROD_SITE}"
          elif [[ "${GITHUB_REF_NAME}" == feature/* ]] && [ "${{ needs.check-open-pr.outputs.has_open_pr }}" = "true" ]; then
            TARGET_SITE="${FIREBASE_ALPHA_SITE}"
          fi

          echo "target_site=${TARGET_SITE}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.target.outputs.target_site != ''
        uses: actions/checkout@v4

      - name: Download dist artifact
        if: steps.target.outputs.target_site != ''
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node
        if: steps.target.outputs.target_site != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        if: steps.target.outputs.target_site != ''
        run: npm install -g firebase-tools

      - name: Prepare Firebase credentials
        if: steps.target.outputs.target_site != ''
        id: firebase_creds
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIARD_PRIVATE_KEY: ${{ secrets.FIARD_PRIVATE_KEY }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/private-key.json"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIARD_PRIVATE_KEY" ]; then
            printf '%s' "$FIARD_PRIVATE_KEY" > "$HOME/private-key.json"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing FIREBASE_SERVICE_ACCOUNT (or legacy FIARD_PRIVATE_KEY) secret. Skipping alpha deploy for this run."
            exit 0
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/private-key.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        if: steps.firebase_creds.outputs.ready == 'true'
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only "hosting:${{ steps.target.outputs.target_site }}" --non-interactive
